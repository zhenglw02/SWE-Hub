# javascript_config.yaml

name: JavaScript
placeholder_body: "{ /* TODO: Implement this function */ }"
indent_size: 2
file_extensions: [".js", ".mjs"]
file_patterns: ["/test/", "/tests/", "/__tests__/", ".test.js", ".spec.js"]

# 所有 Tree-sitter 查询
queries:
  # 用于识别代码实体的查询
  entity_query: |
      (function_declaration name: (identifier) @entity.name) @entity.function
      (method_definition name: (property_identifier) @entity.name) @entity.function
      (class_declaration name: (identifier) @entity.name) @entity.class
      (lexical_declaration (variable_declarator name: (identifier) @entity.name value: (arrow_function))) @entity.function

  # 用于计算代码复杂度的查询
  complexity_query: |
    (if_statement) @decision
    (for_statement) @decision
    (for_in_statement) @decision
    (while_statement) @decision
    (do_statement) @decision
    (switch_statement) @decision
    (catch_clause) @decision
    (ternary_expression) @decision
    (binary_expression operator: ["&&" "||" "??"]) @operator

  # 用于 FilterManager 的查询, 用于获取 entity 中是否包含一些基础属性
  filters_query:
    has_class_parents: "(class_declaration (class_heritage) @check)"
    has_decorators: "(decorator) @decorator"
    has_function_definitions: "(function_declaration) @function (method_definition) @function (arrow_function) @function"
    has_loops: "[ (for_statement) @loop (for_in_statement) @loop (while_statement) @loop (do_statement) @loop ]"
    has_indexing: "(subscript_expression) @indexing"
    has_conditionals: "(if_statement) @conditional"
    has_function_calls: "(call_expression) @function_call"
    has_return_statements: "(return_statement) @return_statement"
    has_exceptions: "(try_statement) @try_statement"
    # 注：JavaScript 原生没有列表推导式
    has_imports: "(import_statement) @import"
    has_assignments: "[ (assignment_expression) @assignment (augmented_assignment_expression) @assignment ]"
    has_nested_class_definitions: "(class_declaration) @class"
    has_lambda_functions: "(arrow_function) @lambda"
    has_arithmetic_operations: '(binary_expression operator: ["+" "-" "*" "/" "%"] @binary_op)'
    has_wrappers: "(try_statement (catch_clause)) @try_except"
    has_off_by_one_comparison: '(binary_expression operator: ["<" ">" "<=" ">="])'
    # has_if_else: "(if_statement alternative: (else_clause))"
    has_if_else: "(if_statement alternative: (_) @else_branch)"
    has_binary_operations: "(binary_expression) @binary_op"
    has_boolean_operations: '(binary_expression operator: ["&&" "||" "??"])'
    has_unary_operations: "(unary_expression) @unary_op"
    has_nested_function_definitions: "(function_declaration) @nested_function"

  # 用于各种 Modifier 的查询 (按功能组织)
  modifiers:
    operations:
      SWAP_OPERANDS: |
        (binary_expression left: (_) @left right: (_) @right) @target
      CHANGE_OPERATOR: |
        (binary_expression operator: _ @operator) @target
      FLIP_OPERATOR: |
        (binary_expression operator: _ @operator) @target
      # BREAK_CHAINS: (binary_expression left: (_) @left right: (_) @right) @target
      BREAK_CHAINS: |
        (binary_expression left: (binary_expression left: (_) @operand) @sub_expression)
        (binary_expression right: (binary_expression right: (_) @operand) @sub_expression)
      CHANGE_CONSTANTS: "(number) @integer"
    
    control_flow:
      INVERT_IF_ELSE: |
        (if_statement
          consequence: (statement_block) @if_body
          alternative: (else_clause (statement_block) @else_body)
        ) @target
      INVERT_IF_ELIF: |
        (if_statement
          consequence: (statement_block) @if_body
          alternative: (else_clause (if_statement consequence: (statement_block) @elif_body))
        ) @target
      SHUFFLE_FUNCTION_BODY: |
        (function_declaration body: (statement_block) @function_body)

    classes:
      REMOVE_CLASS_BASES: "(class_declaration (class_heritage) @inheritance_clause)"
      SHUFFLE_CLASS_BODY: "(class_declaration body: (class_body) @class_body)"
      FIND_CLASS_FUNCTIONS: "(class_declaration body: (class_body (method_definition) @function))"

    removals:
      FIND_LOOPS: "[ (for_statement) @loop (for_in_statement) @loop (while_statement) @loop (do_statement) @loop ]"
      FIND_CONDITIONALS: "(if_statement) @conditional"
      # FIND_ASSIGNMENTS: "[ (assignment_expression) @assignment (augmented_assignment_expression) @assignment ]"
      FIND_ASSIGNMENTS: |
        [
          (lexical_declaration) @assignment
          (variable_declaration) @assignment
          (expression_statement (assignment_expression)) @assignment
          (expression_statement (augmented_assignment_expression)) @assignment
        ]
      FIND_WRAPPERS: "[ (with_statement) @wrapper (try_statement) @wrapper ]"
      FIND_WRAPPERS_WITH_BODY: |
        [
          (with_statement body: (_) @body) @wrapper
          (try_statement body: (statement_block) @body) @wrapper
        ]

  # 语言特殊逻辑
  change_operators_groups:
    add_sub_ops: ["+", "-"]
    mul_div_ops: ["*", "/", "%"]
    bit_ops: ["&", "|", "^"]
    shift_ops: ["<<", ">>", ">>>"]
  flipped_operators:
      '<': '>='
      '>': '<='
      '<=': '>'
      '>=': '<'
      '==': '!='
      '!=': '=='
      '===': '!=='
      '!==': '==='
      '&&': '||'
      '||': '&&'
  change_constants_valid_parents: [
    "assignment_expression", "return_statement", "call_expression",
    "array", "expression_statement", "augmented_assignment_expression",
    "subscript_expression", "object", "binary_expression", "variable_declarator"
  ]
  function_context_types: ["function_declaration", "method_definition", "arrow_function"]
  shuffle_lines_blacklist: ['{', '}']
